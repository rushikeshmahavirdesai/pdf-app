<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URL → PDF</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1a1a1a;
        background: #f4f4f5;
      }
      body {
        max-width: 36rem;
        margin: 3rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
      }
      p {
        color: #52525b;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.35rem;
      }
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.65rem;
        border: 1px solid #d4d4d8;
        border-radius: 6px;
        font-size: 1rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.55rem 1rem;
        font-size: 0.9375rem;
        font-weight: 500;
        color: #fff;
        background: #18181b;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .err {
        margin-top: 0.85rem;
        padding: 0.6rem;
        border-radius: 6px;
        font-size: 0.875rem;
        background: #fef2f2;
        color: #991b1b;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Download page as PDF</h1>
    <p>Paste a public https link. The PDF opens in your browser or downloads depending on settings.</p>
    <form id="f">
      <label for="url">Page URL</label>
      <input id="url" type="url" name="url" placeholder="https://example.com/article" required autocomplete="off" />
      <button type="submit" id="go">Download PDF</button>
    </form>
    <div id="e" class="err" hidden></div>
    <script>
      const form = document.getElementById("f");
      const inp = document.getElementById("url");
      const btn = document.getElementById("go");
      const err = document.getElementById("e");

      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        err.hidden = true;
        const url = inp.value.trim();
        if (!url) return;
        btn.disabled = true;
        try {
          const q = encodeURIComponent(url);
          const r = await fetch("/api/pdf?url=" + q);
          const cd = r.headers.get("Content-Disposition");
          let name = "page.pdf";
          if (cd) {
            const m = /filename="([^"]+)"/i.exec(cd);
            if (m) name = m[1];
          }
          if (!r.ok) {
            const ct = r.headers.get("Content-Type") || "";
            let msg = r.statusText;
            if (ct.includes("application/json")) {
              const j = await r.json();
              msg = j.error || JSON.stringify(j);
            } else {
              msg = await r.text();
            }
            throw new Error(msg);
          }
          const blob = await r.blob();
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = name;
          a.click();
          URL.revokeObjectURL(a.href);
        } catch (ex) {
          err.textContent = String(ex.message || ex);
          err.hidden = false;
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
