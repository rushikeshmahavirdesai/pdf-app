<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URL → PDF</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        color: #18181b;
        background: linear-gradient(160deg, #f4f4f5 0%, #e4e4e7 100%);
        min-height: 100vh;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.25rem;
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        background: #fff;
        border-radius: 12px;
        padding: 1.5rem 1.35rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border: 1px solid #e4e4e7;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.2rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      .sub {
        margin: 0 0 1.15rem;
        font-size: 0.875rem;
        color: #71717a;
        line-height: 1.45;
      }
      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #52525b;
        margin-bottom: 0.4rem;
      }
      input[type="url"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.65rem 0.7rem;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: #18181b;
        box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.12);
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      button {
        padding: 0.62rem 1rem;
        font-size: 0.9375rem;
        font-weight: 600;
        color: #fff;
        background: #18181b;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
      }
      button:hover:not(:disabled) {
        background: #27272a;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .hint {
        font-size: 0.8125rem;
        color: #a1a1aa;
        margin-top: 0.35rem;
      }
      .status {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
        color: #52525b;
        min-height: 1.25rem;
      }
      .status.working {
        color: #2563eb;
      }
      .err {
        margin-top: 0.65rem;
        padding: 0.65rem 0.7rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
        white-space: pre-wrap;
      }
      .err-help {
        margin-top: 0.5rem;
        padding: 0.65rem 0.7rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        background: #f0f9ff;
        color: #1e3a5f;
        border: 1px solid #bae6fd;
        line-height: 1.45;
      }
      .err-help code {
        font-size: 0.76rem;
        display: block;
        margin-top: 0.35rem;
        padding: 0.45rem 0.5rem;
        background: #e0f2fe;
        border-radius: 6px;
        word-break: break-all;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Download page as PDF</h1>
      <p class="sub">
        Paste a <strong>public</strong> page link (https), then download the PDF. Keep this tab open while it runs. Some sites
        (e.g. behind Cloudflare on <em>katinamagazine.org</em>) block cloud servers — use the
        <strong>desktop command</strong> below for those pages.
      </p>
      <form id="f" class="row">
        <div>
          <label for="url">Public URL</label>
          <input
            id="url"
            type="url"
            name="url"
            inputmode="url"
            autocomplete="off"
            spellcheck="false"
            placeholder="https://example.com/your-article"
            required
          />
          <p class="hint">Must start with <code>https://</code> or <code>http://</code></p>
        </div>
        <div>
          <button type="submit" id="go">Download PDF</button>
          <p class="status" id="st" aria-live="polite"></p>
        </div>
      </form>
      <div id="e" class="err" hidden></div>
      <div id="ehelp" class="err-help" hidden></div>
    </div>
    <script>
      function parseFilename(contentDisposition) {
        if (!contentDisposition) return "page.pdf";
        const star = /filename\*=(?:UTF-8''|utf-8'')([^;\n]+)/i.exec(contentDisposition);
        if (star) {
          try {
            return decodeURIComponent(star[1].trim().replace(/^"+|"+$/g, ""));
          } catch {
            /* fall through */
          }
        }
        const q = /filename="([^"]+)"/i.exec(contentDisposition);
        if (q) return q[1];
        const u = /filename=([^;\n]+)/i.exec(contentDisposition);
        if (u) return u[1].trim().replace(/^"+|"+$/g, "");
        return "page.pdf";
      }

      function triggerDownload(blob, filename) {
        const a = document.createElement("a");
        const href = URL.createObjectURL(blob);
        a.href = href;
        a.download = filename;
        a.rel = "noopener noreferrer";
        document.body.appendChild(a);
        a.click();
        requestAnimationFrame(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(href);
        });
      }

      const form = document.getElementById("f");
      const inp = document.getElementById("url");
      const btn = document.getElementById("go");
      const err = document.getElementById("e");
      const ehelp = document.getElementById("ehelp");
      const st = document.getElementById("st");

      function showError(msg) {
        err.textContent = msg;
        err.hidden = false;
        const blocked =
          /bot check|cloudflare|SITE_BLOCKED/i.test(msg) || msg.includes("hosted server");
        ehelp.textContent = "";
        if (!blocked) {
          ehelp.hidden = true;
          return;
        }
        ehelp.hidden = false;

        const lead = document.createElement("p");
        lead.style.marginTop = "0";
        lead.appendChild(document.createTextNode(
          "This site checks for automated browsers from cloud datacenters. "
        ));
        const s = document.createElement("strong");
        s.textContent = "Fix: run the exporter on your computer";
        lead.appendChild(s);
        lead.appendChild(document.createTextNode(
          " (a real Chromium window finishes the check once)."
        ));

        const p2 = document.createElement("p");
        p2.textContent = "In the pdf-app folder on your PC:";
        const cmds = document.createElement("code");
        cmds.textContent = "npm install\nnpx playwright install chromium\nnpm run pdf:headed";
        cmds.title = "Then paste your URL when the terminal prompts you.";

        const p3 = document.createElement("p");
        p3.textContent = "Or, if Chromium is already installed:";
        const c3 = document.createElement("code");
        const u = inp.value.trim() || "https://example.com/your-page";
        c3.textContent = 'npm run pdf -- "' + u.replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '" --headed';

        ehelp.append(lead, p2, cmds, p3, c3);
      }

      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        err.hidden = true;
        ehelp.hidden = true;
        ehelp.textContent = "";
        st.textContent = "";
        st.classList.remove("working");
        const url = inp.value.trim();
        if (!url) return;
        btn.disabled = true;
        st.classList.add("working");
        st.textContent = "Generating PDF… this can take up to a minute.";
        try {
          const q = encodeURIComponent(url);
          const r = await fetch("/api/pdf?url=" + q);
          const name = parseFilename(r.headers.get("Content-Disposition"));
          if (!r.ok) {
            const ct = r.headers.get("Content-Type") || "";
            let msg = r.statusText || "Request failed";
            if (ct.includes("application/json")) {
              const j = await r.json();
              msg = j.error || JSON.stringify(j);
            } else {
              const t = await r.text();
              if (t) msg = t.slice(0, 500);
            }
            throw new Error(msg);
          }
          const blob = await r.blob();
          if (blob.size < 100) {
            throw new Error("Unexpected empty response. Is the server running?");
          }
          triggerDownload(blob, name);
          st.classList.remove("working");
          st.textContent = "Done — check your Downloads folder.";
        } catch (ex) {
          st.classList.remove("working");
          st.textContent = "";
          showError(String(ex.message || ex));
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
